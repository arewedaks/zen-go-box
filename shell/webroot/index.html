<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenGoBox Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { margin-top: 0; font-weight: 800; font-size: 2rem; color: var(--accent-blue); }
        p { color: var(--text-muted); margin-bottom: 20px; }
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        .terminal {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #10b981;
            text-align: left;
            height: 150px;
            overflow-y: auto;
            margin-top: 15px;
            display: none;
            white-space: pre-wrap;
            border: 1px solid var(--glass-border);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container" id="loading-view">
        <div class="loader"></div>
        <p>Checking daemon status...</p>
    </div>

    <div class="container" id="setup-view" style="display: none;">
        <h1>⚡ ZenGoBox</h1>
        <p>First time setup required. Choose your preferred proxy core to extract configurations.</p>
        
        <select id="core-select">
            <option value="clash">Clash (Mihomo)</option>
            <option value="sing-box">Sing-Box</option>
            <option value="xray">Xray</option>
            <option value="v2fly">V2fly</option>
            <option value="hysteria">Hysteria</option>
            <option value="all">Install All Cores</option>
        </select>
        
        <button id="btn-setup">Start Setup Wizard</button>
        <div id="terminal" class="terminal"></div>
        <p id="setup-log" style="margin-top: 15px; font-size: 0.9rem; color: #3b82f6; display: none;"></p>
    </div>

    <script>
        const loadingView = document.getElementById('loading-view');
        const setupView = document.getElementById('setup-view');
        const btnSetup = document.getElementById('btn-setup');
        const coreSelect = document.getElementById('core-select');
        const setupLog = document.getElementById('setup-log');
        const terminal = document.getElementById('terminal');

        async function checkDaemon() {
            try {
                // Try to connect to Zashboard
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1000);
                const res = await fetch('http://127.0.0.1:9999/api/status', { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (res.ok) {
                    // Daemon is running, redirect to Zashboard
                    document.location = 'http://127.0.0.1:9999/';
                    return;
                }
            } catch (e) {
                // Fetch failed, daemon is likely offline
            }
            
            // Show setup wizard
            loadingView.style.display = 'none';
            setupView.style.display = 'block';
        }

        btnSetup.addEventListener('click', async () => {
            if (!window.ksu) {
                alert("Error: KernelSU API not found. Are you opening this from KernelSU WebUI?");
                return;
            }
            
            const core = coreSelect.value;
            btnSetup.disabled = true;
            btnSetup.innerHTML = '<div class="loader"></div> Installing...';
            setupLog.style.display = 'block';
            terminal.style.display = 'block';
            
            setupLog.innerText = "Initializing background installer...";
            terminal.innerText = "> Preparing environment...\n";

            // Run setup command in background and redirect output to setup.log
            const logFile = "/data/local/tmp/zengobox_setup.log";
            await ksu.exec(`rm -f ${logFile}`);
            await ksu.exec(`(/data/adb/zengobox/bin/zengobox setup ${core} > ${logFile} 2>&1) &`);
            
            // Poll the log file
            const pollInterval = setInterval(async () => {
                try {
                    const res = await ksu.exec(`tail -n 20 ${logFile}`);
                    if (res && res.out) {
                        terminal.innerText = res.out;
                        terminal.scrollTop = terminal.scrollHeight;
                        
                        // Check for completion
                        if (res.out.includes("Setup complete!")) {
                            clearInterval(pollInterval);
                            setupLog.innerText = "Starting proxy daemon...";
                            
                            // Start daemon asynchronously without awaiting so it doesn't block IPC
                            ksu.exec(`sh /data/adb/modules/zengobox/service.sh`);
                            
                            setupLog.innerText = "All done! Redirecting to Zashboard...";
                            setTimeout(() => {
                                document.location = 'http://127.0.0.1:9999/';
                            }, 2000);
                        }
                    }
                } catch (e) {
                    console.error("Polling error", e);
                }
            }, 1000);
        });

        // Run check on load
        setTimeout(checkDaemon, 500);
    </script>
</body>
</html>
