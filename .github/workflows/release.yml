name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Package Magisk Module
        run: |
          # Extract the version from the tag (e.g., v1.0.7)
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # Auto-update module.prop version and versionCode based on the tag
          VERSION_NUM=$(echo $VERSION | tr -d 'v.')
          sed -i "s/^version=.*/version=${VERSION}/" shell/module.prop
          sed -i "s/^versionCode=.*/versionCode=100${VERSION_NUM}/" shell/module.prop
          
          make build-magisk
          
          # Check if the generated ZIP exists
          ZIP_FILE="bin/ZenGoBox-Magisk-${VERSION}.zip"
          if [ -f "$ZIP_FILE" ]; then
            echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          else
            echo "Error: Generated ZIP file not found!"
            exit 1
          fi

      - name: Update OTA JSON & Changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          
          # Generate Changelog
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"* %s")
          else
            CHANGES=$(git log -1 --pretty=format:"* %s")
          fi
          
          # Prepend changes to CHANGELOG.md
          echo -e "## ${VERSION}\n\n${CHANGES}\n\n$(cat CHANGELOG.md)" > CHANGELOG.md
          
          # Generate update.json for Magisk/KernelSU
          VERSION_CODE=$(grep versionCode shell/module.prop | cut -d= -f2)
          cat <<EOF > update.json
          {
            "version": "${VERSION}",
            "versionCode": ${VERSION_CODE},
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/ZenGoBox-Magisk-${VERSION}.zip",
            "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/master/CHANGELOG.md"
          }
          EOF
          
          git add update.json CHANGELOG.md shell/module.prop
          git commit -m "chore: Auto-update OTA JSON, Changelog, and module.prop for ${VERSION} [skip ci]" || true
          git push origin master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_FILE }}
            bin/zengobox-arm64
            bin/zengobox-armv7
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send to Telegram Topic
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_TOPIC_ID: ${{ secrets.TG_TOPIC_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram credentials not provided. Skipping Telegram notification."
            exit 0
          fi
          
          # Generate simple changelog (last 5 commits)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"• %s" | head -n 5)
          else
            CHANGELOG=$(git log -1 --pretty=format:"• %s")
          fi
          
          # Use printf to properly format the caption with line breaks for Telegram
          CAPTION=$(printf "ZenGoBox %s Released\n\nChangelog:\n%s\n\nThe Magisk Module is ready for installation." "${VERSION}" "${CHANGELOG}")
          
          # Jika ada TG_TOPIC_ID, kirim ke topik. Jika tidak, kirim ke chat utama.
          if [ -n "$TG_TOPIC_ID" ]; then
            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TG_CHAT_ID}" \
              -F message_thread_id="${TG_TOPIC_ID}" \
              -F document=@"${{ env.ZIP_FILE }}" \
              -F caption="${CAPTION}")
          else
            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TG_CHAT_ID}" \
              -F document=@"${{ env.ZIP_FILE }}" \
              -F caption="${CAPTION}")
          fi
          
          echo "Telegram Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q "HTTP_STATUS:200"; then
            echo "Successfully sent to Telegram!"
          else
            echo "Error sending to Telegram!"
            exit 1
          fi
