<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zashboard | ZenGoBox</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header class="glass-panel">
            <div class="brand">
                <div class="logo">⚡</div>
                <div class="brand-text">
                    <h1>ZenGoBox</h1>
                    <p>Master Control Panel</p>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-icon" id="btn-settings" title="Settings">⚙️</button>
                <div class="status-badge" id="status-badge">
                    <span class="dot"></span>
                    <span id="status-text">Connecting...</span>
                </div>
            </div>
        </header>

        <main>
            <section class="control-panel glass-panel">
                <div class="panel-header">
                    <h2>Core Switch</h2>
                </div>
                <div class="switch-container">
                    <label class="toggle-switch">
                        <input type="checkbox" id="power-switch" disabled>
                        <span class="slider"></span>
                    </label>
                    <div class="switch-info">
                        <h3 id="core-name">Unknown Core</h3>
                        <p id="core-pid">PID: ---</p>
                    </div>
                </div>
                
                <div class="quick-actions">
                    <button class="btn btn-clash" id="btn-clash" style="display: none;" onclick="window.open('http://127.0.0.1:9090/ui', '_blank')">
                        🚀 Open Clash Dashboard
                    </button>
                </div>
            </section>

            <section class="logs-panel glass-panel">
                <div class="panel-header">
                    <h2>Live Terminal Logs</h2>
                    <div class="log-actions">
                        <button class="btn-icon active" id="btn-scroll" title="Auto-scroll to bottom">⏬ Auto-Scroll</button>
                    </div>
                </div>
                <div class="terminal" id="terminal">
                    <!-- Logs will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal" style="display: none;">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>⚙️ ZenGoBox Settings</h2>
                <button class="btn-close" id="btn-close-settings">✖</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Proxy Core</label>
                    <select id="setting-core" class="form-control">
                        <option value="clash">Clash</option>
                        <option value="sing-box">Sing-Box</option>
                        <option value="xray">Xray</option>
                        <option value="v2fly">V2fly</option>
                        <option value="hysteria">Hysteria</option>
                    </select>
                </div>

                <div class="form-group toggle-group">
                    <label>Smart Wi-Fi Toggle</label>
                    <label class="toggle-switch small">
                        <input type="checkbox" id="setting-wifi">
                        <span class="slider"></span>
                    </label>
                    <small>Auto-switch proxy based on Wi-Fi state</small>
                </div>

                <div class="form-group toggle-group">
                    <label>Cronjob Auto-Updater</label>
                    <label class="toggle-switch small">
                        <input type="checkbox" id="setting-cron">
                        <span class="slider"></span>
                    </label>
                    <small>Auto-download GeoIP/GeoSite & Subscriptions</small>
                </div>

                <div class="form-group toggle-group">
                    <label>Custom Rules Injector</label>
                    <label class="toggle-switch small">
                        <input type="checkbox" id="setting-rules">
                        <span class="slider"></span>
                    </label>
                    <small>Inject rules.yaml into subscriptions</small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-save" id="btn-save-settings">Save & Restart Daemon</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
